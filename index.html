<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreShop - Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Elms+Sans:ital,wght@0,100..900;1,100..900&display=swap');

        @font-face {
            font-family: 'Orbitron';
            src: url('../fontes/Orbitron-VariableFont_wght.ttf') format('truetype');
        }


        body {
            font-family: "Elms Sans", sans-serif;
            font-optical-sizing: auto;
            font-weight: weight;
            font-style: normal;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: #d62222;
        }
    </style>
</head>

<body class="telaLogin">
    <center>
        <h1>Login</h1>
        <form action="tela_principal.html">
            <fieldset style="width: fit-content;">
                <legend>Login</legend>
                <p>
                    <label for="idNomeLogin">Usuário:</label>
                    <input type="text" name="usuario" placeholder="Digite seu usuário..." id="idNomeLogin"
                        required><br><br>
                </p>

                <p>
                    <label for="idSenhaLogin">Senha:</label>
                    <input type="password" name="senha" placeholder="Digite sua senha..." id="idSenhaLogin" required
                        pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                        title="Deve conter pelo menos um número, uma letra maiúscula, uma letra minúscula e 8 caracteres."><br><br>
                </p>

                <a href="novo_usuario.html">Registrar</a><br><br>

                <a href="recuper_senha.html">Recuperar Senha</a><br><br>

                <input type="submit" value="Entrar">
            </fieldset>
        </form>
    </center>
</body>

</html>
