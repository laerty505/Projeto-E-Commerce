<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreShop - Login</title>
</head>

<body>
    <center>
        <h1>Login</h1>
        <form action="tela_principal.html">
            <fieldset style="width: fit-content;">
                <legend>Login</legend>
                <p>
                    <label for="idNomeLogin">Usuário:</label>
                    <input type="text" name="" placeholder="Digite seu usuário..." id="idNomeLogin" required><br><br>
                </p>

                <p>
                    <label for="idSenhaLogin">Senha:</label>
                    <input type="password" name="" placeholder="Digite sua senha..." id="idSenhaLogin" required><br><br>
                </p>

                <a href="novo_usuario.html">Registrar</a><br><br>

                <a href="recuper_senha.html">Recuperar Senha</a><br><br>

                <input type="submit" value="Entrar">
            </fieldset>
        </form>
    </center>
</body>

</html>
