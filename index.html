<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreShop - Login</title>
</head>

<body>
    <form action="tela_principal/tela_principal.html">
        <fieldset style="width: fit-content;">
            <legend>Login</legend>
            <label for="idNomeLogin">Usuário:</label>
            <input type="text" name="" placeholder="Digite ser usuário..." id="idNomeLogin"><br><br>
            <label for="idSenhaLogin">Senha:</label>
            <input type="password" name="" placeholder="Digite sua senha..." id="idSenhaLogin"><br><br>
            <input type="submit" value="Entrar">
        </fieldset>
    </form>
</body>

</html>
