<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreShop - Recuperar</title>
    <link rel="stylesheet" href="style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Elms+Sans:ital,wght@0,100..900;1,100..900&display=swap');

        @font-face {
            font-family: 'Orbitron';
            src: url('../fontes/Orbitron-VariableFont_wght.ttf') format('truetype');
        }

        body {
            font-family: "Elms Sans", sans-serif;
            font-optical-sizing: auto;
            font-weight: weight;
            font-style: normal;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: #d62222;
        }
    </style>
</head>

<body class="telaLogin">
    <center>
        <h1>Recuperar Senha</h1>
        <form action="index.html" onsubmit="alert('Um código de recuperação foi enviado ao seu e-mail!.')">
            <fieldset style="width: fit-content;">
                <legend>Recuperar acesso</legend>
                <p>
                    <label for="idEmailRec">Email:</label>
                    <input type="email" name="email" id="idEmailRec" placeholder="Digite o e-mail cadastrado..." required>
                </p>

                <p>
                    <button type="submit">Enviar</button>
                </p>
                
            </fieldset>
        </form>
    </center>
</body>

</html>
