<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Compra</title>
</head>

<body>
    <header
        style="display: flex; justify-content: space-between; align-items: center; padding: 10px; border: 1px solid black;">

        <div>
            <a href="tela_principal.html">
                <img src="imgs/logo.png" alt="Logo" width="100">
            </a>
        </div>

        <div>
            <a href="index.html" style="margin-right: 15px;">Sair</a>
            <a href="sobre.html" style="margin-right: 15px;">Sobre</a>
            <a href="checkout.html">
                <img src="imgs/carrinho.png" alt="Carrinho" width="80">
            </a>
        </div>
    </header>
    <center>
        <h1>Finalizar Compra</h1>
    </center>
    <table>
        <label for="idCheck3050">RTX 3050</label>
        <a href="detalhes_3050.html" id="idCheck3050">
            <img src="imgs/rtx3050.jpg" alt="RTX 3050">
        </a>
        <label for="idCheck7600">RX 7600</label>
        <a href="detalhes_rx7600.html" id="idCheck7600">
            <img src="imgs/rx7600.jpg" alt="RX 7600" width="230" height="230">
        </a>
        <label for="idCheck5060">RTX 5060</label>
        <a href="detalhes_5060.html" id="idCheck5060">
            <img src="imgs/rtx5060.jpg" alt="RTX 5060">
        </a>
    </table>
    <br><br><br>
    <center>
        <h1>Pagamento</h1>
    </center>
    <form action="tela_principal.html" onsubmit="alert('Compra finalizada com sucesso!')">
        <p>
            <label for="idCep">CEP:</label>
            <input type="text" name="" id="idCep" placeholder="Digite o CEP">
        </p>
        <p>
            <label for="idEndereço">Endereço:</label>
            <input type="text" name="" id="idEndereço" placeholder="Digite o endereço de entrega">
        </p>
        <p>
            <label for="idNumero">Número:</label>
            <input type="text" name="" id="idNumero" placeholder="Digite o número da residência">
        </p>
        <p>
            <label for="idTelefone">Telefone:</label>
            <input type="text" name="" id="idTelefone" placeholder="Digite um telefone para contato">
        </p>
        <p>
            <label for="idFormaPagamento">Forma de pagamento:</label>
            <select name="Forma de pagamento" id="idFormaPagamento">
                <option value="" disabled selected></option>
                <option value="">Pix</option>
                <option value="">Boleto</option>
                <option value="">Cartão de Crédito</option>
                <option value="">Cartão de Débito</option>
            </select>
        </p>
        <p>
            <button type="submit">Realizar Pagamento</button>
        </p>
    </form>

</body>

</html>
